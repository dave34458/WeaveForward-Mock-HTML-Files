<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WeaveForward - Donor Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--g:#4a7c59;--gd:#3d6849;--bg:#f0ede8;--tx:#222;--mu:#888}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
body{background:var(--bg);color:var(--tx);min-height:100vh;display:flex}
.hidden{display:none!important}
.layout,.left,.right{display:flex;min-height:100vh}
.layout{width:100%}
.left{width:380px;min-width:380px;background:var(--g) repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 2px,transparent 2px,transparent 14px);flex-shrink:0;background-size:cover;background-position:center}
.right{flex:1;align-items:center;justify-content:center;padding:48px;background:#fff;overflow-y:auto}
.form-wrap{width:100%;max-width:520px}
@media (max-width:768px){.left{display:none}.right{padding:24px}.grid-3{grid-template-columns:1fr}}
.title{font-family:'Pixelify Sans',monospace;font-size:36px;color:var(--g);margin-bottom:6px}
.sub{font-size:24px;font-weight:500;margin-bottom:30px}
.up{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.grid-3,.phone-row,.group{margin-bottom:14px;display:flex}
.grid-3,.phone-row{display:grid;gap:14px}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.phone-row{grid-template-columns:72px 1fr;gap:8px}
.group{flex-direction:column;gap:4px}
.in,.btn{width:100%;outline:none;transition:.2s;border-radius:8px}
.in{border:1.5px solid #d5d5d5;padding:11px 16px;font-size:14px}
.in:focus{border-color:var(--g)}
.in:read-only{background:#fefefe;color:#555;cursor:not-allowed}
.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--g);color:#fff;border:none;border-radius:30px;padding:13px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px}
.btn:hover{background:var(--gd)}
.step-nav{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
.step-dot{width:14px;height:14px;border-radius:50%;background:#ccc}
.step-btn{width:40px;height:40px;border-radius:50%;background:var(--g);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
.ac,.pin-wrap,.modal{position:relative}
.pin-wrap .in{padding-right:42px}
.ac-list{position:absolute;z-index:50;top:calc(100% + 4px);left:0;width:100%;max-height:220px;overflow:auto;background:#fff;border:1.5px solid #e0dbd4;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ac-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f5f5f5}
.ac-item:hover{background:#fdf6e8}
.pin{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--g);cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9000}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:620px;max-width:95vw}
.map-head{display:flex;align-items:center;gap:8px;font-weight:600;font-size:16px;margin-bottom:6px}
.map-sub{font-size:13px;color:#888;margin-bottom:12px}
.map-close{position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;font-size:22px;color:#888}
#picker-map{width:100%;height:300px;border-radius:8px;z-index:1;margin-bottom:14px}
</style>
</head>
<body>
<form id="frm" class="layout" action="/donor_register/" method="post">
<div class="left" style="background-image:url('https://i.imgur.com/EDEi62t.jpeg')"></div>
<div class="right">
<div class="form-wrap">
<div class="title">DONOR</div>
<div class="sub">Personal Information</div>
<div id="step1">
<div class="grid-3">
<div class="group"><label class="up">First Name</label><input class="in" name="first_name"></div>
<div class="group"><label class="up">Middle Name</label><input class="in" name="middle_name"></div>
<div class="group"><label class="up">Last Name</label><input class="in" name="last_name"></div>
</div>
<div class="group"><label class="up">Email Address</label><input class="in" type="email" name="email"></div>
<div class="group"><label class="up">Phone Number</label><div class="phone-row"><input class="in" value="+63" readonly><input class="in" name="phone"></div></div>
<div class="group"><label class="up">Password</label><input class="in" type="password" name="password"></div>
<div class="group"><label class="up">Confirm Password</label><input class="in" type="password" name="confirm_password"></div>
</div>
<div id="step2" class="hidden">
<div class="group"><label class="up">Pickup Address</label><div class="ac"><div class="pin-wrap"><input id="addr" name="pickup_address" class="in" oninput="srAddr(this.value)" onblur="hdAc()"><button type="button" class="pin" onclick="opMap()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></button></div><div id="ac" class="ac-list hidden"></div></div></div>
<input type="hidden" id="lat" name="latitude"><input type="hidden" id="lng" name="longitude">
<div class="group"><label class="up">City</label><input id="city" name="city" class="in" readonly></div>
<div class="group" style="margin-bottom:8px"><label class="up">Barangay</label><input id="brgy" name="barangay" class="in" readonly></div>
<button type="submit" class="btn" onclick="event.preventDefault();alert('Success');location.href='login.html'">Register</button>
</div>
<div class="step-nav">
<button type="button" class="step-btn" onclick="go(-1)">❮</button>
<div style="display:flex;gap:8px"><div id="d1" class="step-dot" style="background:var(--g)"></div><div id="d2" class="step-dot"></div></div>
<button type="button" id="next-btn" class="step-btn" onclick="go(1)">❯</button>
</div>
</div>
</div>
</form>
<div id="map-modal" class="modal hidden">
<div class="modal-box"><button type="button" class="map-close" onclick="clMap()">×</button><div class="map-head"><svg width="16" height="16" fill="none" stroke="var(--g)" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> Pick on Map</div><div class="map-sub">Click anywhere or drag marker.</div><div id="picker-map"></div><button type="button" class="btn" style="margin:0" onclick="cfMap()">Confirm Location</button></div>
</div>
<script>
const gE=i=>document.getElementById(i),hdAc=()=>setTimeout(()=>gE('ac')?.classList.add('hidden'),200);
let cS=1,aT,aR=[],m,mk,tLt=14.589,tLg=120.982;
function go(d){if(cS==2&&d==-1)cS=1;else if(cS==1&&d==1)cS=2;gE('step1').classList.toggle('hidden',cS!=1);gE('step2').classList.toggle('hidden',cS!=2);gE('d1').style.background=cS==1?'var(--g)':'#ccc';gE('d2').style.background=cS==2?'var(--g)':'#ccc';gE('next-btn').style.visibility=cS==1?'visible':'hidden'}
function srAddr(v){const ac=gE('ac');if(v.length<3)return ac.classList.add('hidden');clearTimeout(aT);aT=setTimeout(async()=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${v}, Philippines&limit=5&countrycodes=ph`);aR=await r.json();ac.innerHTML=aR.map((r,i)=>`<div class="ac-item" onmousedown="slAddr(${i})">${r.display_name}</div>`).join('');ac.classList.remove('hidden')}catch{}},350)}
function slAddr(i){const lt=(+aR[i].lat).toFixed(7),lg=(+aR[i].lon).toFixed(7);gE('addr').value=aR[i].display_name;gE('lat').value=lt;gE('lng').value=lg;fLD(lt,lg)}
async function fLD(lt,lg){try{const r=await fetch(`/api/get-location-details/?lat=${lt}&lng=${lg}`);if(r.ok){const d=await r.json();gE('city').value=d.city||'';gE('brgy').value=d.barangay||''}}catch{}}
function opMap(){gE('map-modal').classList.remove('hidden');let lt=+gE('lat').value||14.589,lg=+gE('lng').value||120.982;tLt=lt;tLg=lg;if(!m){m=L.map('picker-map').setView([lt,lg],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);mk=L.marker([lt,lg],{draggable:!0}).addTo(m);mk.on('dragend',e=>{tLt=e.target.getLatLng().lat;tLg=e.target.getLatLng().lng});m.on('click',e=>{tLt=e.latlng.lat;tLg=e.latlng.lng;mk.setLatLng(e.latlng)})}else{m.setView([lt,lg]);mk.setLatLng([lt,lg]);m.invalidateSize()}}
async function cfMap(){gE('lat').value=(+tLt).toFixed(7);gE('lng').value=(+tLg).toFixed(7);const lt=gE('lat').value,lg=gE('lng').value;clMap();try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lt}&lon=${lg}`);gE('addr').value=(await r.json()).display_name||`${lt}, ${lg}`}catch{}fLD(lt,lg)}
function clMap(){gE('map-modal').classList.add('hidden')}
</script>
</body>
</html>
