<!DOCTYPE html>
<!--
  WeaveForward TUAB — View Donation (tuab_view_donation.html)
  Read-only donation items (brand/material separated via brand_fiber_lookup FK),
  with actionable right-side claim controls (pickup/delivery).

  Django notes:
  • {% extends 'base.html' %}
  • {% block content %} ... {% endblock %}
  • sidebar_variant = 'tuab'
  • clothing_items each expose item.brand_fiber_lookup.brand/material
  • Claim Pick-Up / Claim Delivery are POST actions
-->
<html lang="en"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TUAB View Donation — Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{--tuab:#c0410e;--tuab-dark:#a0360c;--gold:#e8a020;--bg:#f5f2eb;--border:#e0dbd4;--text:#222;--muted:#888;--light:#fdf6e8}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:Poppins,sans-serif;background:var(--bg);color:var(--text)} .hidden{display:none!important}
    .layout{display:flex;gap:24px;align-items:flex-start}.left{flex:1}.right{width:320px;flex-shrink:0}
    .card,.panel{background:#fff;border:1.5px solid var(--border);border-radius:14px}.card{padding:20px 22px;margin-bottom:14px}.panel{padding:22px 24px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.group{display:flex;flex-direction:column;gap:4px}
    .up{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.in{width:100%;height:44px;border:1.5px solid #d5d5d5;border-radius:8px;padding:10px 14px;font:14px Poppins,sans-serif;background:#faf8f5}
    .head{display:flex;align-items:center;gap:10px;margin-bottom:14px}.num{width:28px;height:28px;border-radius:50%;background:var(--tuab);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center}
    .drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f0ea;font-size:13px}.drow:last-child{border-bottom:none}.lbl{color:#aaa}.val{font-weight:500;text-align:right;max-width:58%}
    .sep{border-top:1px solid #f0ede8;margin-top:14px;padding-top:14px}.btn{width:100%;border:none;border-radius:30px;padding:12px;color:#fff;font:500 14px Poppins,sans-serif;cursor:pointer}
    .btn-tuab{background:var(--tuab);margin-bottom:10px}.btn-tuab:hover{background:var(--tuab-dark)}
    .ac{position:relative}.pin-wrap{position:relative}.pin-wrap .in{padding-right:40px}.pin{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--gold);cursor:pointer}
    .ac-list{position:absolute;top:calc(100% + 4px);left:0;width:100%;max-height:220px;overflow:auto;background:#fff;border:1.5px solid var(--border);border-radius:8px;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.12)}
    .ac-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f5f5f5}.ac-item:hover{background:var(--light)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9000}.box{background:#fff;border-radius:16px;padding:24px;position:relative;width:min(620px,95vw)} #picker-map{height:300px;border-radius:8px}
    @media (max-width:768px){.layout{flex-direction:column;align-items:stretch}.left,.right{width:100%}.row{grid-template-columns:1fr}}
  </style>
</head><body>
<div class="layout">
  <div class="left">
    <div class="card"><div class="head"><div class="num">1</div><span style="font-weight:600;font-size:15px">Clothing 1</span></div>
      <div class="row"><div class="group"><label class="up">Clothing</label><input class="in" value="Pants" readonly/></div><div class="group"><label class="up">Estimated Weight (kg)</label><input class="in" value="0.8" readonly/></div></div>
      <div class="group" style="margin-bottom:12px"><label class="up">Condition</label><input class="in" value="Fair" readonly/></div>
      <div class="row" style="margin-bottom:0"><div class="group"><label class="up">Brand</label><input class="in" value="Levi's" readonly/></div><div class="group"><label class="up">Material</label><input class="in" value="99% Cotton, 1% Elastane" readonly/></div></div>
    </div>
  </div>
  <div class="right"><div class="panel">
    <div class="drow"><span class="lbl">Donor</span><span class="val">Maria Santos</span></div><div class="drow"><span class="lbl">Status</span><span class="val" style="color:var(--tuab)">Pending</span></div>
    <div class="drow"><span class="lbl">Preferred Date</span><span class="val">02-10-2026</span></div><div class="drow"><span class="lbl">Time Window</span><span class="val">4:02 AM – 5:50 PM</span></div>
    <div class="sep"><img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=300&q=70" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:14px" alt="Donation"/>
      <button class="btn btn-tuab" onclick="alert('Claimed for Pick-Up!')">Claim for Pick-Up</button>
      <div style="font-weight:600;font-size:15px;margin-bottom:8px">Delivery Location</div>
      <div class="ac" style="margin-bottom:12px"><div class="pin-wrap"><input id="d-addr" class="in" value="Escoda Street, Ermita, Manila" oninput="nominatimSearch(this.value,'d-ac','d-lat','d-lng','d-addr')"/><button class="pin" onclick="openPickerFor('d-addr','d-lat','d-lng')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></button></div><div id="d-ac" class="ac-list hidden"></div><input id="d-lat" type="hidden" value="14.5890"/><input id="d-lng" type="hidden" value="120.9822"/></div>
      <div style="font-weight:600;font-size:15px;margin-bottom:8px">Scheduled Time</div><input class="in" type="time" value="09:00" style="margin-bottom:12px"/>
      <button class="btn btn-tuab" onclick="alert('Claimed for Delivery!')">Claim for Delivery</button>
    </div>
  </div></div>
</div>
<div id="map-modal" class="modal hidden"><div class="box"><button onclick="closeMapPicker()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer">×</button><div style="font-weight:600;margin-bottom:8px">Pick on Map</div><div id="picker-map"></div><button class="btn" style="background:var(--gold);margin-top:14px" onclick="confirmMapPicker()">Confirm Location</button></div></div>
<script>
const timers={},acR=[]; let mp,mk,pf,plat,plng,la=14.5890,lo=120.9822;
async function nominatimSearch(v,ac,lat,lng,input){const A=document.getElementById(ac);if(!v||v.length<3){A.classList.add('hidden');return;}clearTimeout(timers[ac]);timers[ac]=setTimeout(async()=>{try{const d=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(v+', Philippines')}&limit=5&countrycodes=ph`,{headers:{'Accept-Language':'en-US'}}).then(r=>r.json());acR[ac]=d||[];A.innerHTML=(acR[ac].length?acR[ac].map((r,i)=>`<div class='ac-item' onmousedown="selectAC('${ac}',${i},'${lat}','${lng}','${input}')">${r.display_name}</div>`).join(''):'<div class="ac-item">No results</div>');A.classList.remove('hidden')}catch{A.classList.add('hidden')}},350)}
function selectAC(ac,i,lat,lng,input){const r=(acR[ac]||[])[i];if(!r)return;document.getElementById(input).value=r.display_name;document.getElementById(lat).value=r.lat;document.getElementById(lng).value=r.lon;document.getElementById(ac).classList.add('hidden')}
function openPickerFor(f,lat,lng){pf=f;plat=lat;plng=lng;la=parseFloat(document.getElementById(lat)?.value)||14.5890;lo=parseFloat(document.getElementById(lng)?.value)||120.9822;document.getElementById('map-modal').classList.remove('hidden');setTimeout(()=>{if(mp)mp.remove();mp=L.map('picker-map').setView([la,lo],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(mp);mk=L.marker([la,lo],{draggable:true}).addTo(mp);mk.on('dragend',e=>{const ll=e.target.getLatLng();la=ll.lat;lo=ll.lng});mp.on('click',e=>{la=e.latlng.lat;lo=e.latlng.lng;mk.setLatLng([la,lo])});},120)}
function closeMapPicker(){document.getElementById('map-modal').classList.add('hidden');if(mp){mp.remove();mp=null}}
async function confirmMapPicker(){let d=`${la.toFixed(5)}, ${lo.toFixed(5)}`;try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${la}&lon=${lo}&addressdetails=1`,{headers:{'Accept-Language':'en-US'}}).then(x=>x.json());if(r.display_name)d=r.display_name}catch{};document.getElementById(pf).value=d;document.getElementById(plat).value=la;document.getElementById(plng).value=lo;closeMapPicker()}
document.addEventListener('click',e=>{document.querySelectorAll('.ac-list').forEach(a=>{if(!a.closest('.ac')?.contains(e.target))a.classList.add('hidden')});if(e.target===document.getElementById('map-modal'))closeMapPicker()});
</script>
</body></html>
