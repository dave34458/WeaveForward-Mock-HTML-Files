<!DOCTYPE html>
<!--
  WeaveForward TUAB â€” Dashboard  (tuab_dashboard.html)
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  PURPOSE
  â”€â”€â”€â”€â”€â”€â”€
  Standalone reference for the TUAB Dashboard page content.
  Shows only what goes inside {% block content %} of base.html.
  The sidebar, topbar, fonts, and layout shell are provided by navbar.html.

  When converting to a Django template:
    â€¢ {% extends 'base.html' %}
    â€¢ {% block content %} ... {% endblock %}
    â€¢ Set context: page_title = 'Dashboard', sidebar_variant = 'tuab'
    â€¢ Replace DONATIONS JS object with {{ donations_json|safe }} from view
    â€¢ Replace hardcoded tab counts with {{ available_count }} / {{ claimed_count }}
    â€¢ Flag form: POST to /tuab/donations/<id>/flag/ with reason field
    â€¢ "Manage" links: href="{% url 'tuab_view_donation' pk=d.id %}" (available)
                      href="{% url 'tuab_update_donation' pk=d.id %}" (claimed)

  Context variables expected:
    page_title         â†’ 'Dashboard'
    sidebar_variant    â†’ 'tuab'
    donations_json     â†’ JSON list [{id,donor,address,pickupDate,timeWindow,items:[],lat,lng,status}, ...]
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TUAB Dashboard â€” Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* â”€â”€ Design tokens (match navbar.html) â”€â”€ */
    :root {
      --gold:      #e8a020;
      --gold-dark: #c8881a;
      --tuab:      #c0410e;
      --tuab-dark: #a0360c;
      --bg:        #f5f4f0;
      --card:      #ffffff;
      --border:    #e0dbd4;
      --text:      #222222;
      --muted:     #888888;
      --green:     #4a7c59;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); }

    /*
      NOTE: In Django this content sits inside .wf-content (padded by navbar.html).
      .preview-shell below simulates that container locally.
    */
    .preview-shell { padding: 0; }

    /* â”€â”€ Buttons â”€â”€ */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 500; transition: all .2s; text-decoration: none; }
    .btn-tuab  { background: var(--tuab);  color: #fff; border-radius: 6px; padding: 5px 14px; font-size: 12px; }
    .btn-tuab:hover { background: var(--tuab-dark); }
    .btn-flag  { background: #fff1d8; color: #f3c97e; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-family: 'Poppins', sans-serif; cursor: pointer; font-weight: 500; }

    /* â”€â”€ Map â”€â”€ */
    #tuab-dash-map { width: 100%; height: 220px; border-radius: 12px; margin-bottom: 20px; }

    /* â”€â”€ Table card â”€â”€ */
    .dash-card { background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 10px; }

    /* â”€â”€ Tabs â”€â”€ */
    .tab-btn { font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 22px; border: none; border-bottom: 3px solid transparent; background: transparent; color: #aaa; cursor: pointer; transition: all .2s; }
    .tab-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

    /* â”€â”€ Table â”€â”€ */
    .dash-table { width: 100%; border-collapse: collapse; }
    .dash-table th { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 600; color: #aaa; text-align: left; padding: 10px 12px; border-bottom: 1.5px solid #ede8e2; background: #faf8f5; text-transform: uppercase; letter-spacing: .4px; }
    .dash-table td { font-family: 'Poppins', sans-serif; font-size: 13px; color: #333; padding: 13px 12px; border-bottom: 1px solid #f0ede8; vertical-align: middle; }
    .dash-table tr:last-child td { border-bottom: none; }
    .dash-table tr:hover td { background: #fdf9f5; }

    /* â”€â”€ Search â”€â”€ */
    .search-wrap { position: relative; flex-shrink: 0; }
    .search-input { padding: 9px 14px 9px 36px; width: 200px; border: 1.5px solid #fff1d8; border-radius: 8px; background: #fff1d8; color: #c0952a; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; }

    /* â”€â”€ Flag modal â”€â”€ */
    .modal-overlay { position: fixed; inset: 0; z-index: 9500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.45); }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px 32px; width: 420px; max-width: 95vw; box-shadow: 0 24px 80px rgba(0,0,0,.25); }
    .modal-input { width: 100%; border: 1.5px solid #e0dbd4; border-radius: 8px; padding: 10px 14px; font-family: 'Poppins', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px; }
    .modal-input:focus { border-color: var(--tuab); }
    .hidden { display: none !important; }

    /* â”€â”€ Table scroll wrapper (mobile) â”€â”€ */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       MOBILE  (â‰¤ 768px)
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    @media (max-width: 768px) {
      .dash-card { padding: 14px 14px; }
      .tab-row { flex-wrap: wrap; gap: 8px; }
      .search-input { width: 160px; }
      #tuab-dash-map { height: 180px; }
    }
  </style>
</head>
<body>

<!--
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  CONTENT BLOCK â€” this is all that goes inside {% block content %}
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
-->
<div class="preview-shell">

  <!-- Map
       Django: pass donations_json from view; swap JS array below -->
  <div id="tuab-dash-map"></div>

  <!-- Table card -->
  <div class="dash-card">
    <div class="tab-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px">
      <div style="display:flex;gap:0;flex-shrink:0">
        <button class="tab-btn active" id="tab-available" onclick="setTab('available')">Available</button>
        <button class="tab-btn" id="tab-claimed" onclick="setTab('claimed')">Claimed</button>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" fill="none" stroke="#c0952a" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="dash-search" placeholder="Search Donation ID..." oninput="filterTable()"/>
      </div>
    </div>

    <div class="table-scroll">
      <div id="dash-table-wrap"></div>
    </div>
    <div id="dash-table-count" style="font-family:'Poppins',sans-serif;font-size:12px;color:#aaa;margin-top:12px"></div>
  </div>

</div>

<!-- â•â•â• FLAG MODAL â•â•â•
     Django: replace JS submitFlag() with a real form POST to /tuab/donations/<id>/flag/ -->
<div id="flag-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;color:#1a1a1a">Enter reason for flagging</div>
    <input id="flag-reason-input" class="modal-input" placeholder="Type reason here..."/>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeFlagModal()" style="border-radius:30px;padding:9px 24px;font-size:14px;background:#fef7ea;border:1.5px solid #f5d898;color:#888;font-family:'Poppins',sans-serif;cursor:pointer">Cancel</button>
      <button onclick="submitFlag()" style="border-radius:30px;padding:9px 24px;font-size:14px;background:var(--tuab);border:none;color:#fff;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:500">Submit</button>
    </div>
  </div>
</div>

<script>
  /* Django: replace with {{ donations_json|safe }} from view
     Each object: { id, donor, address, pickupDate, timeWindow, items:[], lat, lng, status:'available'|'claimed' } */
  const DONATIONS = {
    available: [
      { id:'DON-001', donor:'Maria Santos',  address:'Escoda St, Barangay 675, Ermita, Manila', pickupDate:'02-10-2026', timeWindow:'4:02 AM â€“ 5:50 PM', items:2, lat:14.5890, lng:120.9822 },
      { id:'DON-002', donor:'Jose Reyes',    address:'7421 Taft Avenue, Barangay 39, Malate, Manila', pickupDate:'01-25-2026', timeWindow:'9:00 AM â€“ 12:00 PM', items:2, lat:14.5653, lng:120.9940 },
      { id:'DON-003', donor:'Ana Cruz',      address:'Barangay 76, Pasay City, Metro Manila', pickupDate:'01-10-2026', timeWindow:'2:00 PM â€“ 6:00 PM', items:3, lat:14.5378, lng:121.0014 },
    ],
    claimed: [
      { id:'DON-004', donor:'Ramon Garcia',  address:'V. Luna Road, Pinyahan, Quezon City', pickupDate:'02-15-2026', timeWindow:'10:00 AM â€“ 2:00 PM', items:1, lat:14.6335, lng:121.0437 },
      { id:'DON-005', donor:'Isabel Torres', address:'Katipunan Ave, Loyola Heights, Quezon City', pickupDate:'02-20-2026', timeWindow:'8:00 AM â€“ 12:00 PM', items:2, lat:14.6530, lng:121.0780 },
    ]
  };

  let activeTab = 'available';
  let flagTarget = null;

  function renderTable(list, tab) {
    if (!list.length) return `<p style="font-family:'Poppins',sans-serif;color:#bbb;padding:20px 0">No donations found.</p>`;
    /* Django: replace href values with {% url %} tags */
    const manageUrl = tab === 'claimed' ? 'tuab_update_donation.html' : 'tuab_view_donation.html';
    return `<table class="dash-table"><thead><tr>
      <th>Donation ID</th><th>Donor</th><th>Address</th><th>Pickup Date</th><th>Items</th><th>Actions</th>
    </tr></thead><tbody>
    ${list.map(d => `<tr>
      <td style="font-weight:600">${d.id}</td>
      <td>${d.donor}</td>
      <td style="max-width:160px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.address.substring(0,36)}â€¦</td>
      <td style="white-space:nowrap">${d.pickupDate}</td>
      <td style="font-weight:600">${d.items}</td>
      <td><div style="display:flex;gap:6px">
        <a href="${manageUrl}" class="btn btn-tuab">Manage</a>
        <button class="btn-flag" onclick="openFlagModal('${d.id}','${tab}')">Flag</button>
      </div></td>
    </tr>`).join('')}
    </tbody></table>`;
  }

  function setTab(tab) {
    activeTab = tab;
    document.getElementById('tab-available').classList.toggle('active', tab === 'available');
    document.getElementById('tab-claimed').classList.toggle('active', tab === 'claimed');
    const list = DONATIONS[tab];
    document.getElementById('dash-table-wrap').innerHTML = renderTable(list, tab);
    document.getElementById('dash-table-count').textContent = `Showing ${list.length} of ${list.length} items`;
  }

  function filterTable() {
    const q = document.getElementById('dash-search').value.toLowerCase();
    const full = DONATIONS[activeTab];
    const list = q ? full.filter(d => d.donor.toLowerCase().includes(q) || d.id.toLowerCase().includes(q)) : full;
    document.getElementById('dash-table-wrap').innerHTML = renderTable(list, activeTab);
    document.getElementById('dash-table-count').textContent = `Showing ${list.length} of ${full.length} items`;
  }

  function openFlagModal(id, tab) {
    flagTarget = { id, tab };
    document.getElementById('flag-reason-input').value = '';
    document.getElementById('flag-modal').classList.remove('hidden');
  }
  function closeFlagModal() {
    document.getElementById('flag-modal').classList.add('hidden');
    flagTarget = null;
  }
  function submitFlag() {
    /* Django: POST { donation_id: flagTarget.id, reason: input.value } to /tuab/donations/<id>/flag/ */
    closeFlagModal();
  }

  window.addEventListener('load', () => {
    const map = L.map('tuab-dash-map', { zoomControl: true, scrollWheelZoom: false }).setView([14.5820, 121.0100], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'Â© OpenStreetMap contributors' }).addTo(map);
    [...DONATIONS.available, ...DONATIONS.claimed].forEach(d => {
      L.marker([d.lat, d.lng]).addTo(map).bindPopup(`<b>${d.donor}</b><br>${d.address.substring(0, 40)}â€¦`);
    });
    setTab('available');
  });

  document.addEventListener('click', e => {
    if (e.target === document.getElementById('flag-modal')) closeFlagModal();
  });
</script>
</body>
</html>
