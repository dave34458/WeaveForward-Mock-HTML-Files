<!DOCTYPE html>
<!--
  WeaveForward TUAB â€” Fiber-Match Recommendations  (tuab_fiber_match.html)
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  PURPOSE
  â”€â”€â”€â”€â”€â”€â”€
  Standalone reference for the Fiber-Match Recommendations page content.
  Shows only what goes inside {% block content %} of base.html.

  SPECIAL LAYOUT NOTE:
  This page uses a full-height split layout (map left, panel right) that
  needs to fill the remaining viewport below the topbar. In Django, to
  achieve this, the parent .wf-content must have overflow:hidden and the
  content block must stretch to fill it. Add this to base.html for this page:
    {% block body_class %}fiber-page{% endblock %}
  And in CSS: .fiber-page .wf-content { padding: 0; overflow: hidden; display: flex; flex-direction: column; }

  When converting to a Django template:
    â€¢ {% extends 'base.html' %}
    â€¢ {% block content %} ... {% endblock %}
    â€¢ Set context: page_title = 'Fiber-Match Recommendations', sidebar_variant = 'tuab'
    â€¢ Replace FIBER_MATCHES with {{ fiber_matches_json|safe }} from view
    â€¢ Accept: POST to /tuab/donations/<id>/accept/
    â€¢ Reject: POST to /tuab/donations/<id>/reject/ with reason field

  Context variables expected:
    page_title        â†’ 'Fiber-Match Recommendations'
    sidebar_variant   â†’ 'tuab'
    fiber_matches_json â†’ JSON list of match objects
    pending_count     â†’ integer count of pending matches

  Mobile behaviour:
    Map stacks above panel. Panel becomes a normal scrollable list below the map.
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiber-Match Recommendations â€” Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --gold:      #e8a020;
      --tuab:      #c0410e;
      --tuab-dark: #a0360c;
      --bg:        #f5f4f0;
      --border:    #e0dbd4;
      --text:      #222222;
      --muted:     #888888;
      --green:     #4a7c59;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); }
    .hidden { display: none !important; }

    /*
      In Django: .wf-content wraps this block. Override padding/overflow for this page.
      .fiber-page .wf-content { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    */
    .fiber-shell { display: flex; flex-direction: column; height: calc(100vh - 60px); overflow: hidden; }

    /* Banner */
    .fiber-banner { padding: 12px 24px; background: #fff8ee; border-bottom: 1px solid #f0e8d8; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }

    /* Map + panel split */
    .fiber-layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    #fm-map { flex: 1; min-width: 0; }
    .fiber-panel { width: 320px; flex-shrink: 0; background: #f5f0ea; overflow-y: auto; border-left: 1px solid #e8e0d8; display: flex; flex-direction: column; }
    .fiber-panel-header { padding: 14px 16px 12px; background: #fff; border-bottom: 1px solid #f0ede8; display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
    #fm-cards { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

    /* Match card */
    .match-card { background: #fff; border-radius: 12px; padding: 14px 16px; cursor: pointer; border: 1.5px solid #f0ede8; transition: border-color .2s; }
    .match-card:hover { border-color: var(--gold); }

    /* Reject modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px 26px; width: 320px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'Poppins', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px; }
    .modal-input:focus { border-color: var(--tuab); }

    /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
       MOBILE  (â‰¤ 768px)
    â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
    @media (max-width: 768px) {
      .fiber-shell { height: auto; overflow: visible; }
      .fiber-layout { flex-direction: column; overflow: visible; }
      #fm-map { height: 260px; flex: none; }
      .fiber-panel { width: 100%; border-left: none; border-top: 1px solid #e8e0d8; overflow: visible; }
    }
  </style>
</head>
<body>

<!--
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  CONTENT BLOCK â€” this is all that goes inside {% block content %}
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
-->
<div class="fiber-shell">

  <!-- Banner
       Django: {{ pending_count }} -->
  <div class="fiber-banner">
    <span style="font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;color:var(--gold)">Match Recommendation</span>
    <span style="font-family:'Poppins',sans-serif;font-size:12px;color:#aaa">5 pending Â· sorted by match score</span>
  </div>

  <div class="fiber-layout">

    <!-- Leaflet map -->
    <div id="fm-map"></div>

    <!-- Ranked recommendations panel -->
    <div class="fiber-panel">
      <div class="fiber-panel-header">
        <div>
          <div style="font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:#1a1a1a">Ranked Recommendations</div>
          <div style="font-family:'Poppins',sans-serif;font-size:11px;color:#bbb;margin-top:2px">Click a card to highlight on map</div>
        </div>
        <span style="font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:var(--gold)">Match Score</span>
      </div>
      <!-- Django: {% for match in fiber_matches %} render card {% endfor %} -->
      <div id="fm-cards"></div>
    </div>

  </div>
</div>


<!-- â•â•â• REJECT MODAL â•â•â•
     Django: replace JS with a form POST to /tuab/donations/<id>/reject/ -->
<div id="fm-reject-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;margin-bottom:4px;color:#1a1a1a">Reject Donation</div>
    <div style="font-family:'Poppins',sans-serif;font-size:13px;color:#aaa;margin-bottom:14px">Enter a reason for rejection</div>
    <input id="fm-reject-reason" class="modal-input" placeholder="Reason for rejectionâ€¦"/>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeFmReject()" style="background:#f5f0ea;color:#888;border:none;border-radius:30px;padding:9px 20px;font-size:13px;font-family:'Poppins',sans-serif;cursor:pointer">Cancel</button>
      <button onclick="submitFmReject()" style="background:var(--tuab);color:#fff;border:none;border-radius:30px;padding:9px 20px;font-size:13px;font-family:'Poppins',sans-serif;cursor:pointer;font-weight:600">Confirm</button>
    </div>
  </div>
</div>

<script>
  /* Django: replace with {{ fiber_matches_json|safe }} from view */
  const FIBER_MATCHES = [
    { id:1, name:'Maria Santos',  brgy:'Ermita',   dist:'1.2 km', fiber:'Denim',     weight:'2.8 kg', bio:'Mid (55%)',  score:87, lat:14.5890, lng:120.9822 },
    { id:2, name:'Jose Reyes',    brgy:'Malate',   dist:'2.1 km', fiber:'Cotton',    weight:'2.1 kg', bio:'High (82%)', score:82, lat:14.5653, lng:120.9940 },
    { id:3, name:'Ana Cruz',      brgy:'Pasay',    dist:'3.4 km', fiber:'Polyester', weight:'2.2 kg', bio:'Low (38%)',  score:61, lat:14.5378, lng:121.0014 },
    { id:4, name:'Ramon Garcia',  brgy:'Pinyahan', dist:'4.8 km', fiber:'Cotton',    weight:'0.5 kg', bio:'High (82%)', score:58, lat:14.6335, lng:121.0437 },
    { id:5, name:'Isabel Torres', brgy:'Loyola',   dist:'5.2 km', fiber:'Linen',     weight:'1.1 kg', bio:'High (90%)', score:54, lat:14.6530, lng:121.0780 },
  ];

  const FIBER_COLORS = { Denim:'#c0410e', Cotton:'#e8a020', Linen:'#4a7c59', Polyester:'#888', Wool:'#9b59b6', Silk:'#3d6fa0' };
  let fmStates = {}, fmRejectTarget = null, fmMap = null, fmMarkers = {};

  function renderFmCards() {
    document.getElementById('fm-cards').innerHTML = FIBER_MATCHES.map(m => {
      const st = fmStates[m.id];
      const fiberColor = FIBER_COLORS[m.fiber] || '#888';
      const actionBtn = st === 'accepted'
        ? `<button disabled style="background:var(--green);color:#fff;border:none;border-radius:20px;padding:6px 18px;font-size:11px;font-family:'Poppins',sans-serif;font-weight:700;cursor:default">ACCEPTED</button>`
        : st === 'rejected'
        ? `<button disabled style="background:#ddd;color:#aaa;border:none;border-radius:20px;padding:6px 18px;font-size:11px;font-family:'Poppins',sans-serif;font-weight:700;cursor:default">REJECTED</button>`
        : `<button onclick="event.stopPropagation();fmAccept(${m.id})" style="background:var(--green);color:#fff;border:none;border-radius:20px;padding:6px 18px;font-size:11px;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer">ACCEPT</button>
           <button onclick="event.stopPropagation();fmReject(${m.id})" style="background:var(--tuab);color:#fff;border:none;border-radius:20px;padding:6px 18px;font-size:11px;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer">REJECT</button>`;
      return `
      <div class="match-card" onclick="highlightMarker(${m.id})">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div>
            <div style="font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:#1a1a1a">${m.name}</div>
            <div style="font-family:'Poppins',sans-serif;font-size:11px;color:#aaa">${m.brgy} Â· ${m.dist}</div>
          </div>
          <div style="background:#fff8ee;border:1.5px solid #f5d898;border-radius:20px;padding:4px 10px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;color:var(--gold)">${m.score}</div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <span style="background:${fiberColor}20;color:${fiberColor};border-radius:20px;padding:2px 10px;font-size:11px;font-family:'Poppins',sans-serif;font-weight:600">${m.fiber}</span>
          <span style="background:#f5f0ea;color:#888;border-radius:20px;padding:2px 10px;font-size:11px;font-family:'Poppins',sans-serif">${m.weight}</span>
          <span style="background:#e8f5ee;color:#4a7c59;border-radius:20px;padding:2px 10px;font-size:11px;font-family:'Poppins',sans-serif">${m.bio}</span>
        </div>
        <div style="display:flex;gap:6px">${actionBtn}</div>
      </div>`;
    }).join('');
  }

  function highlightMarker(id) {
    const mk = fmMarkers[id];
    if (mk) { mk.openPopup(); fmMap.panTo(mk.getLatLng()); }
  }
  function fmAccept(id) { fmStates[id] = 'accepted'; renderFmCards(); }
  function fmReject(id) { fmRejectTarget = id; document.getElementById('fm-reject-modal').classList.remove('hidden'); }
  function closeFmReject() { document.getElementById('fm-reject-modal').classList.add('hidden'); fmRejectTarget = null; }
  function submitFmReject() {
    if (fmRejectTarget !== null) fmStates[fmRejectTarget] = 'rejected';
    closeFmReject(); renderFmCards();
  }

  window.addEventListener('load', () => {
    fmMap = L.map('fm-map', { zoomControl: true }).setView([14.560, 121.030], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'Â© OpenStreetMap contributors' }).addTo(fmMap);
    FIBER_MATCHES.forEach(m => {
      fmMarkers[m.id] = L.marker([m.lat, m.lng]).addTo(fmMap).bindPopup(`<b>${m.name}</b><br>${m.fiber} Â· ${m.weight}`);
    });
    renderFmCards();
  });

  document.addEventListener('click', e => {
    if (e.target === document.getElementById('fm-reject-modal')) closeFmReject();
  });
</script>
</body>
</html>
