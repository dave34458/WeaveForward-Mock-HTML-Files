{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>WeaveForward - Select Role</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&family=Poppins:wght@400&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Poppins, sans-serif
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0ede8;
            /* Django: background:url('{% static "images/role_bg.jpg" %}') center/cover no-repeat */
        }

        .cards {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 32px
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 32px 24px 32px;
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: .25s;
            text-decoration: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .13)
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .2)
        }

        .card img {
            width: 100%;
            max-width: 280px;
            height: 260px;
            object-fit: contain;
            object-position: center bottom;
            margin-bottom: 20px
        }

        .card-title {
            font-family: 'Pixelify Sans', monospace;
            font-weight: 400;
            font-size: 42px;
            color: #3C6591;
            letter-spacing: 2px;
            margin-bottom: 16px
        }

        .card-desc {
            font-size: 13px;
            color: #555;
            text-align: center;
            line-height: 1.7
        }

        @media(max-width:640px) {
            .cards {
                gap: 20px;
                padding: 24px 16px
            }

            .card {
                width: 100%;
                max-width: 320px;
                padding: 32px 24px 24px
            }

            .card img {
                width: 160px;
                height: 180px
            }

            .card-title {
                font-size: 36px
            }
        }
    </style>
</head>

<body>
    <div class="cards">
        <a href="{% url 'donor_registration' %}" class="card">
            <img src="https://i.imgur.com/I8EqCQI.png" alt="Donor">
            <!-- Django: <img src="{% static 'images/donor_illus.png' %}" alt="Donor"> -->
            <div class="card-title">DONOR</div>
            <p class="card-desc">Donate garments or textiles and track their reuse by artisan businesses.</p>
        </a>
        <a href="{% url 'tuab_registration' %}" class="card">
            <img src="https://i.imgur.com/j8SYdR5.png" alt="TUAB">
            <!-- Django: <img src="{% static 'images/tuab_illus.png' %}" alt="TUAB"> -->
            <div class="card-title">TUAB</div>
            <p class="card-desc">Operate a textile upcycling business and receive matched textile donations for reuse.
            </p>
        </a>
    </div>
</body>

</html>
